<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Umum – Pustaka Salafiyah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="catalog-page">

  <!-- Header sticky -->
  <header class="cat-header" id="catHeader">
    <div class="cat-header-inner">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
          <path d="M13 5l-5 5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Beranda
      </a>
      <div class="cat-header-title">
        <p class="cat-eyebrow">Pustaka Salafiyah · Salafi Kids</p>
        <h1>Katalog Umum</h1>
      </div>
      <a href="https://wa.me/6287738426088" target="_blank" class="wa-icon-btn" title="Tanya via WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <!-- WhatsApp icon bubble background -->
          <circle cx="12" cy="12" r="11" fill="currentColor"/>
          <!-- White chat bubble -->
          <path d="M6.5 17.5c-.3 0-.6-.1-.8-.3l-1.5.4.4-1.5c-.2-.2-.3-.5-.3-.8 0-2.8 2.2-5 5-5s5 2.2 5 5-2.2 5-5 5c-.3 0-.6-.1-.8-.3l-1.5.4.4-1.5z" fill="white" transform="translate(2 2) scale(0.9)"/>
          <!-- Phone receiver icon inside -->
          <g transform="translate(6.5 8)">
            <path d="M2 0c-.6 0-1 .4-1 1v5c0 .6.4 1 1 1h5c.6 0 1-.4 1-1V1c0-.6-.4-1-1-1H2z" fill="white" opacity="0"/>
            <!-- WhatsApp chat lines -->
            <path d="M1.5 2h5M1.5 4h3.5M1.5 6h4" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
          </g>
        </svg>
      </a>
    </div>
  </header>

  <!-- Toolbar: search + sort + kategori -->
  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="toolbar-row1">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
              <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
              <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <input type="text" id="searchInput" placeholder="Cari judul atau penerbit…" autocomplete="off">
        </div>
        <div class="toolbar-row2">
          <select class="filter-select" id="publisherSelect">
            <option value="all">Semua penerbit</option>
          </select>
          <select class="filter-select" id="statusSelect">
            <option value="all">Semua status</option>
          </select>
          <select class="sort-select" id="sortSelect">
            <option value="default">Urutan default</option>
            <option value="title-az">Judul A–Z</option>
            <option value="title-za">Judul Z–A</option>
            <option value="price-asc">Harga: Rendah–Tinggi</option>
            <option value="price-desc">Harga: Tinggi–Rendah</option>
          </select>
        </div>
      </div>
      <div class="category-wrap">
        <button class="cat-arrow cat-arrow-left" id="catArrowLeft" aria-label="Geser kiri">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M12 5l-5 5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="category-scroll" id="categoryScroll">
          <button class="cat-chip active" data-cat="all">Semua</button>
        </div>
        <button class="cat-arrow cat-arrow-right" id="catArrowRight" aria-label="Geser kanan">
          <svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M8 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Result info -->
  <div class="result-bar">
    <span id="resultCount"></span>
    <span id="pageInfo"></span>
  </div>

  <!-- States -->
  <div id="loading" class="state-msg">Memuat katalog…</div>
  <div id="errorMsg" class="state-msg state-error" style="display:none;"></div>

  <!-- Grid -->
  <main id="bookGrid" class="book-grid"></main>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <footer class="cat-footer">
    © Pustaka Salafiyah – Salafi Kids &nbsp;·&nbsp; Data diperbarui otomatis
  </footer>

  <script src="catalog.js"></script>
  <script>
    initCatalog({
      priceCol:     "Harga jual",
      discountCol:  "Diskon jual",
      basePriceCol: "Harga katalog"
    });
  </script>
</body>
</html>
